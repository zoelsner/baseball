name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python-import-smoke:
    name: Python import smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime deps
        run: pip install -r requirements.txt
      - name: Import every Sandlot module
        # Single combined import — fails fast on syntax/import errors that
        # would otherwise only surface on Railway boot. Web-app modules only;
        # the legacy CLI (audit.py / league_intel.py) is excluded per CLAUDE.md.
        run: |
          python -c "
          import sandlot_api
          import sandlot_config
          import sandlot_skipper
          import sandlot_db
          import sandlot_refresh
          import sandlot_cron
          import sandlot_waivers
          import sandlot_calibration
          import player_service
          import mlb_stats
          print('all imports OK')
          "
      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Write job summary
        if: always()
        run: |
          {
            echo "### Python import smoke"
            echo "- Base: \`${{ github.base_ref || 'n/a' }}\`"
            echo "- Head: \`${{ github.head_ref || github.ref_name }}\`"
            echo "- Python: 3.11"
            echo "- Checks: Sandlot module imports and \`unittest discover\`"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install frontend deps
        run: npm ci
      - name: Build Sandlot frontend
        run: npm run build:sandlot
      - name: Verify committed app bundle is current
        run: git diff --exit-code web/sandlot/app.js
      - name: Write job summary
        if: always()
        run: |
          {
            echo "### Frontend build"
            echo "- Base: \`${{ github.base_ref || 'n/a' }}\`"
            echo "- Head: \`${{ github.head_ref || github.ref_name }}\`"
            echo "- Node: 20"
            echo "- Checks: \`npm ci\`, \`npm run build:sandlot\`, committed bundle freshness"
          } >> "$GITHUB_STEP_SUMMARY"
