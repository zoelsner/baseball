name: CI

on:
  push:
    branches: [main]
  # Run for stacked PRs too. Restricting the base to main leaves child PRs
  # without Python or frontend validation until their parent merges.
  pull_request: {}

jobs:
  python-import-smoke:
    name: Python import smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sandlot
          POSTGRES_PASSWORD: sandlot
          POSTGRES_DB: sandlot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sandlot -d sandlot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SANDLOT_TEST_DATABASE_URL: postgresql://sandlot:sandlot@127.0.0.1:5432/sandlot_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime deps
        run: pip install -r requirements.txt
      - name: Import every Sandlot module
        # Single combined import — fails fast on syntax/import errors that
        # would otherwise only surface on Railway boot. Web-app modules only;
        # the legacy CLI (audit.py / league_intel.py) is excluded per CLAUDE.md.
        run: |
          python -c "
          import sandlot_api
          import sandlot_config
          import sandlot_skipper
          import sandlot_db
          import sandlot_refresh
          import sandlot_cron
          import sandlot_waivers
          import sandlot_calibration
          import sandlot_decision_science
          import sandlot_scoring
          import sandlot_autopsy
          import sandlot_lineup
          import sandlot_win_week
          import player_service
          import mlb_stats
          print('all imports OK')
          "
      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
      - name: Install frontend deps
        run: npm ci
      - name: Build Sandlot frontend
        run: npm run build:sandlot
      - name: Verify committed app bundle is current
        run: git diff --exit-code web/sandlot/app.js
