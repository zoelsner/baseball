name: Sandlot Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  refresh:
    name: Hourly Fantrax refresh
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Gate to 7am-11pm Eastern
        run: |
          hour=$(TZ=America/New_York date +%H)
          if [ "$hour" -lt 7 ] || [ "$hour" -gt 23 ]; then
            echo "Skipping refresh outside 7am-11pm Eastern. Current Eastern hour: $hour"
            exit 0
          fi

      - name: Refresh Fantrax snapshot
        run: |
          curl -fsS -X POST https://web-production-90664.up.railway.app/api/refresh > /tmp/sandlot-refresh.json
          python -c "import json; payload=json.load(open('/tmp/sandlot-refresh.json')); snapshot=payload.get('snapshot') or {}; matchup=snapshot.get('matchup') if isinstance(snapshot.get('matchup'), dict) else {}; projection=matchup.get('projection') if isinstance(matchup.get('projection'), dict) else {}; summary={'status': payload.get('status'), 'snapshot_id': payload.get('snapshot_id') or snapshot.get('snapshot_id'), 'duration_ms': payload.get('duration_ms'), 'taken_at': snapshot.get('taken_at'), 'freshness': snapshot.get('freshness'), 'projection_model': projection.get('model_version'), 'projected_my': projection.get('projected_my'), 'projected_opp': projection.get('projected_opp')}; print(json.dumps(summary, indent=2, default=str))"
