name: Lineup autopsy

on:
  workflow_dispatch: {}
  schedule:
    # Runs after the 4am ET Monday optimizer; read-only DB + MLB Stats API.
    - cron: "30 9 * * 1"

permissions:
  contents: read

jobs:
  autopsy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "psycopg[binary]" requests
      - name: Run autopsy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/run_autopsy.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autopsy-report
          path: autopsy_report.json
          if-no-files-found: ignore
