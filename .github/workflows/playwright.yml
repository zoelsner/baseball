name: Playwright

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily smoke check — catches drift between Fantrax scrape runs (e.g.
    # cookie expiry, schema changes on Fantrax's side that break the parser).
    - cron: "30 14 * * *"  # 14:30 UTC = 09:30 CT roughly

jobs:
  e2e:
    name: E2E against Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tests/playwright
    env:
      # Single source of truth for the deploy URL; falls back to the known prod
      # URL if no secret is set so the workflow runs out-of-the-box. Override
      # by setting `SANDLOT_URL` in the repo's Actions secrets.
      SANDLOT_URL: ${{ secrets.SANDLOT_URL || 'https://web-production-90664.up.railway.app' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('tests/playwright/package-lock.json') }}

      - name: Install chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Wait for Railway deploy (push to main only)
        # Railway redeploys on every main push. Give it time to swap, then
        # poll /api/health until it answers 200 with ok:true. The /api/health
        # route is the only no-DB-friendly probe, so this works even if the
        # new build is mid-warmup.
        if: github.event_name == 'push'
        run: |
          sleep 60
          for i in $(seq 1 30); do
            body=$(curl -fsS "$SANDLOT_URL/api/health" || true)
            if echo "$body" | grep -q '"ok":true'; then
              echo "Railway is live: $body"
              exit 0
            fi
            echo "attempt $i: not live yet"
            sleep 10
          done
          echo "Railway never reported ok:true within 5 min" >&2
          exit 1

      - name: Run Playwright
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report
          retention-days: 14
