name: Playwright

on:
  # Stacked PRs need the same deterministic branch checks as direct-to-main
  # PRs; these jobs do not use write-capable production credentials.
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily smoke check — catches drift between Fantrax scrape runs (e.g.
    # cookie expiry, schema changes on Fantrax's side that break the parser).
    - cron: "30 14 * * *"  # 14:30 UTC = 09:30 CT roughly

jobs:
  e2e:
    name: E2E against Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tests/playwright
    env:
      # Single source of truth for the deploy URL; falls back to the known prod
      # URL if no secret is set so the workflow runs out-of-the-box. Override
      # by setting `SANDLOT_URL` in the repo's Actions secrets.
      SANDLOT_URL: ${{ secrets.SANDLOT_URL || 'https://web-production-90664.up.railway.app' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('tests/playwright/package-lock.json') }}

      - name: Install chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Wait for Railway deploy (push to main only)
        # Railway redeploys on every main push. Give it time to swap, then
        # poll /api/health until it answers 200 with ok:true. The /api/health
        # route is the only no-DB-friendly probe, so this works even if the
        # new build is mid-warmup.
        if: github.event_name == 'push'
        run: |
          sleep 60
          for i in $(seq 1 30); do
            body=$(curl -fsS "$SANDLOT_URL/api/health" || true)
            if echo "$body" | grep -q '"ok":true'; then
              echo "Railway is live: $body"
              exit 0
            fi
            echo "attempt $i: not live yet"
            sleep 10
          done
          echo "Railway never reported ok:true within 5 min" >&2
          exit 1

      - name: Run production API contracts on pull requests
        if: github.event_name == 'pull_request'
        env:
          CI: "true"
        run: npx playwright test specs/attention-api.spec.ts

      - name: Run deployed application Playwright
        if: github.event_name != 'pull_request'
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report
          retention-days: 14

  local-frontend-e2e:
    name: Local frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SANDLOT_URL: http://127.0.0.1:4173
      SANDLOT_EXPECT_SLOT_GATE: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/playwright/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Build Sandlot frontend
        run: npm run build:sandlot

      - name: Install Playwright deps
        working-directory: tests/playwright
        run: npm ci

      - name: Cache Playwright browsers
        id: local-pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('tests/playwright/package-lock.json') }}

      - name: Install chromium
        if: steps.local-pw-cache.outputs.cache-hit != 'true'
        working-directory: tests/playwright
        run: npx playwright install --with-deps chromium

      - name: Serve local Sandlot frontend
        working-directory: web/sandlot
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/sandlot-static.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -fsS "$SANDLOT_URL" >/dev/null; then
              echo "Local Sandlot frontend is live"
              exit 0
            fi
            sleep 1
          done
          cat /tmp/sandlot-static.log || true
          echo "Local Sandlot frontend never became reachable" >&2
          exit 1

      - name: Run deterministic branch browser tests
        working-directory: tests/playwright
        env:
          CI: "true"
        run: >-
          npx playwright test
          specs/smoke.spec.ts
          specs/today-attention.spec.ts
          specs/adds.spec.ts
          specs/player-sheet.spec.ts
          specs/trade.spec.ts
          specs/skipper-web-fallback.spec.ts
          specs/today-projection.spec.ts
          specs/today.spec.ts
          --grep-invert "renders matchup card with shape-correct scores and margin|shows opponent label from snapshot"

      - name: Upload local HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-playwright-report
          path: tests/playwright/playwright-report
          retention-days: 14
