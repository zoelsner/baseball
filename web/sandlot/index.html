<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#efe8dc"/>
<title>Sandlot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0c0e; }
  * { box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }

  /* Mobile: full-bleed app */
  #stage { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  #app   { width:100%; height:100%; background:#efe8dc; position:relative; overflow:hidden; }

  /* Hide scrollbars inside the app shell */
  #app *::-webkit-scrollbar { display:none; }
  #app * { scrollbar-width: none; }

  /* Desktop: center inside an iPhone-shaped frame */
  @media (min-width: 700px) {
    body { background:#e9e4d9; }
    #stage { padding:24px; }
    #app {
      width:393px; height:852px; max-height:calc(100vh - 48px);
      border-radius:42px; box-shadow:0 30px 80px rgba(0,0,0,0.18), 0 0 0 10px #1a1a1a, 0 0 0 11px #2a2a2a;
    }
  }
</style>
</head>
<body>
<div id="stage"><div id="app"><div id="root" style="width:100%;height:100%"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react" src="atoms.jsx"></script>
<script type="text/babel" data-presets="env,react" src="data.jsx"></script>
<script type="text/babel" data-presets="env,react" src="data2.jsx"></script>
<script type="text/babel" data-presets="env,react" src="v2-pages.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<window.V2App initial={{ page:'today' }}/>);
</script>
</body>
</html>
